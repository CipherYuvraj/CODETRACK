<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Settings — CodeTrack</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #060811;
      --bg-card:     rgba(15, 17, 26, 0.8);
      --border:      rgba(255,255,255,0.06);
      --accent:      #4ade80;
      --blue:        #60a5fa;
      --text-1:      #f0f4ff;
      --text-2:      #8b9bbf;
      --text-3:      #4a566e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 13px;
      color: var(--text-2);
      font-family: 'JetBrains Mono', monospace;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 20px;
      backdrop-filter: blur(16px);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-2);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: rgba(255,255,255,0.02);
      color: var(--text-1);
      font-size: 13px;
      font-family: 'Syne', sans-serif;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(74,222,128,0.12);
    }

    .form-input::placeholder {
      color: var(--text-3);
    }

    .helper-text {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 28px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 9px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #030a05;
      flex: 1;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(34,197,94,0.35);
    }

    .btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-2);
      flex: 1;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-refresh {
      background: var(--blue);
      opacity: 0.9;
      color: white;
      margin-top: 20px;
      width: 100%;
    }

    .btn-refresh:hover {
      opacity: 1;
    }

    .message {
      padding: 12px;
      border-radius: 9px;
      margin-bottom: 20px;
      font-size: 12px;
      display: none;
    }

    .message.success {
      background: rgba(74,222,128,0.12);
      border: 1px solid rgba(74,222,128,0.3);
      color: #4ade80;
      display: block;
    }

    .message.error {
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
      display: block;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .stat-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 12px;
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--text-2);
      font-size: 12px;
      margin-bottom: 20px;
    }

    .loading.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Profile Settings</h1>
      <p>Link your coding platform accounts</p>
    </div>

    <div id="message" class="message"></div>

    <div class="card">
      <h2 style="font-size: 16px; margin-bottom: 20px;">Platform Handles</h2>
      
      <div class="form-group">
        <label class="form-label">LeetCode Username</label>
        <input type="text" id="leetcode" class="form-input" placeholder="e.g., vaishnavi">
        <div class="helper-text">Your LeetCode username</div>
      </div>

      <div class="form-group">
        <label class="form-label">Codeforces Handle</label>
        <input type="text" id="codeforces" class="form-input" placeholder="e.g., john_doe">
        <div class="helper-text">Your Codeforces handle</div>
      </div>

      <div class="form-group">
        <label class="form-label">GitHub Username</label>
        <input type="text" id="github" class="form-input" placeholder="e.g., username">
        <div class="helper-text">Your GitHub username</div>
      </div>

      <div class="form-group">
        <label class="form-label">LinkedIn Profile</label>
        <input type="text" id="linkedin" class="form-input" placeholder="e.g., firstname-lastname">
        <div class="helper-text">LinkedIn URL slug</div>
      </div>

      <div class="button-group">
        <button class="btn btn-primary" onclick="saveHandles()">Save Handles</button>
        <button class="btn btn-secondary" onclick="goBack()">Cancel</button>
      </div>

      <button class="btn btn-refresh" onclick="refreshStats()">Refresh Platform Stats Now</button>

      <div class="stats-grid" id="statsGrid" style="display: none;">
        <div class="stat-item">
          <div class="stat-label">LeetCode Solved</div>
          <div class="stat-value" id="lcSolved">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">CF Rating</div>
          <div class="stat-value" id="cfRating">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Easy</div>
          <div class="stat-value" id="lcEasy" style="color: var(--accent);">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">CF Solved</div>
          <div class="stat-value" id="cfSolved">-</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
      ? 'http://localhost:5000/api' 
      : '/api';

    function getAuthHeader() {
      const token = localStorage.getItem('token');
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      };
    }

    async function loadProfile() {
      try {
        const username = localStorage.getItem('username');
        if (!username) {
          showMessage('Not authenticated', 'error');
          setTimeout(() => window.location.href = 'login.html', 2000);
          return;
        }

        const response = await fetch(`${API_BASE_URL}/profile/${username}`, {
          headers: getAuthHeader()
        });

        if (!response.ok) {
          throw new Error('Failed to load profile');
        }

        const data = await response.json();
        const handles = data.profile.platformHandles || {};

        // Populate form
        document.getElementById('leetcode').value = handles.leetcode || '';
        document.getElementById('codeforces').value = handles.codeforces || '';
        document.getElementById('github').value = handles.github || '';
        document.getElementById('linkedin').value = handles.linkedin || '';

        // Show stats if available
        if (data.profile.platformStats && Object.keys(data.profile.platformStats).length > 0) {
          displayStats(data.profile.platformStats);
        }
      } catch (error) {
        console.error('Error loading profile:', error);
      }
    }

    async function saveHandles() {
      try {
        const username = localStorage.getItem('username');
        const handles = {
          leetcode: document.getElementById('leetcode').value || null,
          codeforces: document.getElementById('codeforces').value || null,
          github: document.getElementById('github').value || null,
          linkedin: document.getElementById('linkedin').value || null,
          codechef: null
        };

        const response = await fetch(`${API_BASE_URL}/profile/${username}/handles`, {
          method: 'PATCH',
          headers: getAuthHeader(),
          body: JSON.stringify(handles)
        });

        if (!response.ok) {
          throw new Error('Failed to save handles');
        }

        showMessage('✓ Handles saved successfully!', 'success');
        setTimeout(() => refreshStats(), 1000);
      } catch (error) {
        showMessage('✗ Error saving handles', 'error');
        console.error('Error:', error);
      }
    }

    async function refreshStats() {
      try {
        const username = localStorage.getItem('username');
        setLoading(true);
        showMessage('Fetching stats...', 'success');

        const response = await fetch(`${API_BASE_URL}/profile/${username}/refresh-stats`, {
          headers: getAuthHeader()
        });

        if (!response.ok) {
          throw new Error('Failed to refresh stats');
        }

        const data = await response.json();
        displayStats(data.stats);

        // Update cache
        const userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
        userProfile.platformStats = data.stats;
        localStorage.setItem('userProfile', JSON.stringify(userProfile));

        showMessage('✓ Stats refreshed successfully!', 'success');
      } catch (error) {
        showMessage('✗ Error refreshing stats', 'error');
        console.error('Error:', error);
      } finally {
        setLoading(false);
      }
    }

    function displayStats(stats) {
      const statsGrid = document.getElementById('statsGrid');
      statsGrid.style.display = 'grid';

      if (stats.leetcode && !stats.leetcode.error) {
        document.getElementById('lcSolved').textContent = stats.leetcode.solved || 0;
        document.getElementById('lcEasy').textContent = stats.leetcode.easy || 0;
      }

      if (stats.codeforces && !stats.codeforces.error) {
        document.getElementById('cfRating').textContent = stats.codeforces.rating || 0;
        document.getElementById('cfSolved').textContent = stats.codeforces.solvedCount || 0;
      }
    }

    function showMessage(msg, type) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.className = `message ${type}`;
      setTimeout(() => { el.className = 'message'; }, 4000);
    }

    function setLoading(active) {
      const loading = document.querySelector('.loading');
      if (active) loading.classList.add('active');
      else loading.classList.remove('active');
    }

    function goBack() {
      window.location.href = 'dashboard-modern.html';
    }

    // Load profile on page load
    window.addEventListener('load', loadProfile);
  </script>
  
  <!-- External Profile Settings Script -->
  <script src="profile-settings.js"></script>
</body>
</html>
